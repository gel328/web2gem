name: Release to Docker Hub

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: versioned-release
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "11.6.0"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get current version
        id: get_version
        run: |
          set -euo pipefail
          LATEST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")"
          TAG_VERSION="${LATEST_TAG#v}"
          FILE_VERSION="$(node -p "require('./package.json').version")"

          function version_gt() { test "$(printf '%s\n' "$@" | sort -V | head -n 1)" != "$1"; }

          if version_gt "${FILE_VERSION}" "${TAG_VERSION}"; then
            VERSION="${FILE_VERSION}"
          else
            VERSION="${TAG_VERSION}"
          fi

          echo "Current version: ${VERSION}"
          echo "current_version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Calculate next version
        id: next_version
        env:
          VERSION_TYPE: ${{ github.event.inputs.version_type }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.get_version.outputs.current_version }}"
          BASE_VERSION="$(echo "${VERSION}" | sed 's/-.*$//')"

          IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE_VERSION}"
          MAJOR="${MAJOR:-0}"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH:-0}"

          case "${VERSION_TYPE}" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            *)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
          esac

          echo "New version: ${NEW_VERSION}"
          echo "new_version=${NEW_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "new_tag=v${NEW_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Validate release tag is available
        run: |
          set -euo pipefail
          NEW_TAG="${{ steps.next_version.outputs.new_tag }}"
          if git rev-parse -q --verify "refs/tags/${NEW_TAG}" >/dev/null; then
            echo "Tag ${NEW_TAG} already exists." >&2
            exit 1
          fi

      - name: Update package version
        run: pnpm version ${{ steps.next_version.outputs.new_version }} --no-git-tag-version

      - name: Release Blocking Gates
        run: |
          pnpm typecheck
          pnpm check:arch
          pnpm coverage:ci
          pnpm smoke
          pnpm docker:smoke

      - name: Commit package version and create tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json pnpm-lock.yaml
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump version to ${{ steps.next_version.outputs.new_tag }} [skip ci]"
          fi

          NEW_TAG="${{ steps.next_version.outputs.new_tag }}"
          git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG}"
          git push origin HEAD:main "${NEW_TAG}"

      - name: Capture release revision
        id: revision
        run: echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
          DOCKER_BUILD_SUMMARY: "false"
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/web2gem:${{ steps.next_version.outputs.new_tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/web2gem:${{ steps.next_version.outputs.new_version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/web2gem:latest
          labels: |
            org.opencontainers.image.version=${{ steps.next_version.outputs.new_version }}
            org.opencontainers.image.revision=${{ steps.revision.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
