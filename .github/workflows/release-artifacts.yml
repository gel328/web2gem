name: Release Artifacts

on:
  release:
    types:
      - published
  workflow_call:
    inputs:
      release_tag:
        description: "Release tag to publish (for example v2.0.0)"
        required: true
        type: string
      revision_sha:
        description: "Immutable release revision"
        required: true
        type: string
      prepared_revision:
        description: "The caller already ran the canonical release gates"
        required: false
        default: false
        type: boolean
      publish_dockerhub:
        description: "Publish the release image to Docker Hub"
        required: false
        default: false
        type: boolean
      publish_aliyun:
        description: "Publish the release image to Aliyun Container Registry"
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build/publish (for example v2.0.0)"
        required: true
        type: string
      publish_dockerhub:
        description: "Also publish to Docker Hub"
        required: true
        default: false
        type: boolean
      publish_aliyun:
        description: "Also publish to Aliyun Container Registry"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: release-artifacts-${{ inputs.release_tag || github.event.release.tag_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: "26"
  PNPM_VERSION: "11.10.0"
  RELEASE_TAG: ${{ inputs.release_tag || github.event.release.tag_name }}
  RELEASE_REVISION: ${{ inputs.revision_sha || inputs.release_tag || github.event.release.tag_name }}
  RELEASE_CACHE_SCOPE: release-image

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release revision
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REVISION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release Blocking Gates
        if: ${{ !inputs.prepared_revision }}
        run: |
          pnpm check:release
          pnpm docker:smoke

      - name: Build Worker Artifact
        run: pnpm build

      - name: Prepare Release Assets
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TAG}" ] || [ -z "${RELEASE_REVISION}" ]; then
            echo "release tag and revision must be non-empty." >&2
            exit 1
          fi

          mkdir -p release-assets
          cp dist/worker.js "release-assets/worker.js"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Wait for GHCR endpoint
        run: |
          set -euo pipefail
          for i in {1..6}; do
            code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 https://ghcr.io/v2/ || true)"
            if [ "${code}" = "200" ] || [ "${code}" = "401" ] || [ "${code}" = "405" ]; then
              exit 0
            fi
            sleep "$((i * 10))"
          done
          echo "GHCR endpoint is unreachable after multiple retries (last status: ${code:-unknown})." >&2
          exit 1

      - name: Validate and collect image tags
        id: image_tags
        env:
          GHCR_IMAGE: ghcr.io/${{ github.repository }}
          PUBLISH_DOCKERHUB: ${{ inputs.publish_dockerhub }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          HAS_DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN != '' }}
          PUBLISH_ALIYUN: ${{ inputs.publish_aliyun }}
          ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
          ALIYUN_REGISTRY_NAMESPACE: ${{ secrets.ALIYUN_REGISTRY_NAMESPACE }}
          ALIYUN_REGISTRY_USER: ${{ secrets.ALIYUN_REGISTRY_USER }}
          HAS_ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD != '' }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          tags=(
            "${GHCR_IMAGE}:${RELEASE_TAG}"
            "${GHCR_IMAGE}:${version}"
            "${GHCR_IMAGE}:latest"
          )

          if [ "${PUBLISH_DOCKERHUB}" = "true" ]; then
            if [ -z "${DOCKERHUB_USERNAME}" ] || [ "${HAS_DOCKERHUB_TOKEN}" != "true" ]; then
              echo "Docker Hub publication requires DOCKERHUB_USERNAME and DOCKERHUB_TOKEN." >&2
              exit 1
            fi
            tags+=(
              "${DOCKERHUB_USERNAME}/web2gem:${RELEASE_TAG}"
              "${DOCKERHUB_USERNAME}/web2gem:${version}"
              "${DOCKERHUB_USERNAME}/web2gem:latest"
            )
          fi

          if [ "${PUBLISH_ALIYUN}" = "true" ]; then
            if [ -z "${ALIYUN_REGISTRY}" ] || [ -z "${ALIYUN_REGISTRY_NAMESPACE}" ] || [ -z "${ALIYUN_REGISTRY_USER}" ] || [ "${HAS_ALIYUN_REGISTRY_PASSWORD}" != "true" ]; then
              echo "Aliyun publication requires registry, namespace, user, and password secrets." >&2
              exit 1
            fi
            aliyun_image="${ALIYUN_REGISTRY}/${ALIYUN_REGISTRY_NAMESPACE}/web2gem"
            tags+=(
              "${aliyun_image}:${RELEASE_TAG}"
              "${aliyun_image}:${version}"
              "${aliyun_image}:latest"
            )
          fi

          {
            echo "version=${version}"
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ inputs.publish_dockerhub }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Aliyun Container Registry
        if: ${{ inputs.publish_aliyun }}
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
          DOCKER_BUILD_SUMMARY: "false"
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.image_tags.outputs.tags }}
          labels: |
            org.opencontainers.image.version=${{ steps.image_tags.outputs.version }}
            org.opencontainers.image.revision=${{ env.RELEASE_REVISION }}
          cache-from: type=gha,scope=${{ env.RELEASE_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.RELEASE_CACHE_SCOPE }}

      - name: Export Docker image archives for release assets
        run: |
          set -euo pipefail

          docker buildx build \
            --platform linux/amd64 \
            --tag "web2gem:${RELEASE_TAG}" \
            --tag "web2gem:latest" \
            --label "org.opencontainers.image.version=${{ steps.image_tags.outputs.version }}" \
            --label "org.opencontainers.image.revision=${RELEASE_REVISION}" \
            --cache-from "type=gha,scope=${RELEASE_CACHE_SCOPE}" \
            --output "type=docker,dest=release-assets/web2gem_${RELEASE_TAG}_docker_linux_amd64.tar" \
            .

          docker buildx build \
            --platform linux/arm64 \
            --tag "web2gem:${RELEASE_TAG}" \
            --tag "web2gem:latest" \
            --label "org.opencontainers.image.version=${{ steps.image_tags.outputs.version }}" \
            --label "org.opencontainers.image.revision=${RELEASE_REVISION}" \
            --cache-from "type=gha,scope=${RELEASE_CACHE_SCOPE}" \
            --output "type=docker,dest=release-assets/web2gem_${RELEASE_TAG}_docker_linux_arm64.tar" \
            .

          gzip -f "release-assets/web2gem_${RELEASE_TAG}_docker_linux_amd64.tar"
          gzip -f "release-assets/web2gem_${RELEASE_TAG}_docker_linux_arm64.tar"

      - name: Generate checksums
        run: |
          set -euo pipefail
          (cd release-assets && sha256sum worker.js *.tar.gz > sha256sums.txt)

      - name: Validate release assets
        run: |
          set -euo pipefail
          test -s release-assets/worker.js
          test -s "release-assets/web2gem_${RELEASE_TAG}_docker_linux_amd64.tar.gz"
          test -s "release-assets/web2gem_${RELEASE_TAG}_docker_linux_arm64.tar.gz"
          test -s release-assets/sha256sums.txt

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          FILES=(
            release-assets/worker.js
            "release-assets/web2gem_${RELEASE_TAG}_docker_linux_amd64.tar.gz"
            "release-assets/web2gem_${RELEASE_TAG}_docker_linux_arm64.tar.gz"
            release-assets/sha256sums.txt
          )

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${FILES[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${FILES[@]}" --title "${RELEASE_TAG}" --notes ""
          fi
